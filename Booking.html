<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Garment Factory Visitor Booking</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <style>
      body {
        background: url("https://ppbn.or.id/wp-content/uploads/2022/08/hop-lun-scaled.jpeg")
          center/cover no-repeat fixed;
        min-height: 100vh;
        font-family:
          Segoe UI,
          sans-serif;
      }

      .overlay {
        background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65));
        min-height: 100vh;
        padding: 50px 20px;
      }

      .logo {
        width: 170px;
        margin: auto;
        display: block;
        margin-bottom: 20px;
      }

      h2 {
        font-weight: 700;
        letter-spacing: 1px;
        text-shadow: 0 3px 10px rgba(0, 0, 0, 0.6);
      }

      .card {
        border-radius: 18px;
        border: none;
        background: rgba(255, 255, 255, 0.93);

        /* urutan prefix benar */
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);

        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      label {
        font-weight: 600;
        color: #333;
      }

      .form-control,
      .form-select {
        border-radius: 8px;
        padding: 10px;
        border: 1px solid #dcdcdc;
      }

      .btn-book {
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        border: none;
        padding: 12px;
        font-weight: 600;
        color: white;
        border-radius: 8px;
        transition: 0.3s;
      }

      .btn-book:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 114, 255, 0.5);
      }

      .preview {
        width: 100%;
        max-height: 200px;
        object-fit: cover;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ddd;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="overlay">
      <div class="container">
        <img src="hoplunlogo.png" class="logo" alt="Logo PT Hoplun Indonesia" />

        <h2
          class="text-center text-white mb-4 animate__animated animate__fadeInDown"
        >
          Garment Factory Visitor Booking
        </h2>

        <div class="row justify-content-center">
          <div class="col-lg-6">
            <div class="card shadow-lg animate__animated animate__fadeInUp">
              <form id="bookingForm">
                <div class="mb-3">
                  <label for="nama">Nama Tamu</label>
                  <input
                    type="text"
                    id="nama"
                    class="form-control"
                    placeholder="Masukkan nama tamu"
                  />
                </div>

                <div class="mb-3">
                  <label for="company">Perusahaan</label>
                  <input
                    type="text"
                    id="company"
                    class="form-control"
                    placeholder="Nama perusahaan"
                  />
                </div>

                <div class="mb-3">
                  <label for="email">Email</label>
                  <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Masukkan email"
                  />
                </div>

                <div class="mb-3">
                  <label for="phone">Nomor Telepon</label>
                  <input
                    type="text"
                    id="phone"
                    class="form-control"
                    placeholder="Nomor telepon"
                  />
                </div>

                <div class="mb-3">
                  <label for="date">Tanggal Kunjungan</label>
                  <input type="date" id="date" class="form-control" />
                </div>

                <label>Jam Kunjungan</label>

<div class="row">
  <div class="col">
    <label for="time_start" class="form-label">Dari Jam</label>
    <input
      type="text"
      id="time_start"
      name="time_start"
      class="form-control"
    />
  </div>

  <div class="col">
    <label for="time_end" class="form-label">Sampai Jam</label>
    <input
      type="text"
      id="time_end"
      name="time_end"
      class="form-control"
    />
  </div>
</div>

<!-- TARUH DI BAWAH SEBELUM </body> -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
flatpickr("#time_start", {
  enableTime: true,
  noCalendar: true,
  dateFormat: "H:i",
  time_24hr: true
});

flatpickr("#time_end", {
  enableTime: true,
  noCalendar: true,
  dateFormat: "H:i",
  time_24hr: true
});
</script>

                <div class="mb-3">
                  <label for="dept">PIC</label>
                  <input type="text" id="dept" class="form-control" placeholder="Masukkan PIC">
                </div>

                <div class="mb-3">
                  <label for="host">keperluan</label>
                  <input
                    type="text"
                    id="host"
                    class="form-control"
                    placeholder="keperluan lainnya"
                  />
                </div>

                <div class="mb-3">
                  <label for="ktp">Upload KTP</label>

                  <input
                    type="file"
                    id="ktp"
                    class="form-control"
                    accept="image/*"
                    required
                  />

                  <small class="text-muted">
                    Gambar otomatis dikompres sebelum upload
                  </small>

                  <div class="mt-3">
                    <img id="preview" class="preview" />
                  </div>
                </div>

                <button type="submit" class="btn-book w-100">
                  Submit Booking
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- =========================
SCRIPT COMPRESS IMAGE
========================= -->

    <script>
      const ktpInput = document.getElementById("ktp");
      const preview = document.getElementById("preview");

      // hasil akhir base64
      let compressedBase64 = "";

      ktpInput.addEventListener("change", async function () {
        const file = this.files[0];

        if (!file) return;

        // validasi file image
        if (!file.type.startsWith("image/")) {
          alert("File harus berupa gambar");
          return;
        }

        // compress image
        compressImage(file, 700, 0.6)
          .then((compressed) => {
            compressedBase64 = compressed;

            // tampilkan preview
            preview.src = compressedBase64;
            preview.style.display = "block";

            console.log("Compressed success");
          })
          .catch((err) => {
            console.error(err);
            alert("Gagal compress gambar");
          });
      });

      // =========================
      // FUNCTION COMPRESS IMAGE
      // =========================

      function compressImage(file, maxWidth, quality) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();

          reader.readAsDataURL(file);

          reader.onload = (event) => {
            const img = new Image();

            img.src = event.target.result;

            img.onload = () => {
              const canvas = document.createElement("canvas");
              const ctx = canvas.getContext("2d");

              let width = img.width;
              let height = img.height;

              // resize otomatis
              if (width > maxWidth) {
                height *= maxWidth / width;
                width = maxWidth;
              }

              canvas.width = width;
              canvas.height = height;

              ctx.drawImage(img, 0, 0, width, height);

              // convert ke jpg compressed
              const compressedData = canvas.toDataURL("image/jpeg", quality);

              resolve(compressedData);
            };

            img.onerror = reject;
          };

          reader.onerror = reject;
        });
      }
    </script>

    <!-- =========================
      FIREBASE SAVE
    ========================== -->

    <script type="module">
      import { db } from "./config-firebase.js";

      import {
        ref,
        push,
        set,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const form = document.getElementById("bookingForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const nama = document.getElementById("nama").value;
        const company = document.getElementById("company").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const date = document.getElementById("date").value;
        const time_start = document.getElementById("time_start").value;
        const time_end = document.getElementById("time_end").value;
        const dept = document.getElementById("dept").value;
        const host = document.getElementById("host").value;

        try {
          const newRef = push(ref(db, "visitorBookings"));

          await set(newRef, {
            nama,
            company,
            email,
            phone,
            date,
            time_start,
            time_end,
            dept,
            host,

            // save compressed image
            ktpImage: compressedBase64,

            createdAt: new Date().toISOString(),
          });

          alert("Booking berhasil dikirim");

          form.reset();

          preview.style.display = "none";

          compressedBase64 = "";
        } catch (error) {
          console.error(error);

          alert("Gagal upload data");
        }
      });
    </script>

    
  </body>
</html>
